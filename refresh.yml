name: refresh

on:
  schedule:
    # Runs every day at 06:00 UTC and 18:00 UTC
    - cron: '0 6,18 * * *'
  workflow_dispatch:   # lets you trigger it manually from GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch data
        run: python scripts/fetch_data.py
        continue-on-error: true   # site still builds even if some endpoints fail

      - name: Build site
        run: python scripts/build_site.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: refresh data"
          git push
